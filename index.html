const PLATFORMS = [
  { key:"ig", label:"Instagram", placeholder:"yourusername", icon:"ig", url: h => `https://instagram.com/${h}` },
  { key:"tiktok", label:"TikTok", placeholder:"yourusername", icon:"tiktok", url: h => `https://tiktok.com/@${h}` },
  { key:"x", label:"X", placeholder:"yourusername", icon:"x", url: h => `https://x.com/${h}` },
  { key:"phone", label:"Phone", placeholder:"5550000", icon:"phone", url: h => `tel:${h}` },
];

function PlatformIcon({ type, size=16, color=C.teal }) {
  if (type==="ig") return <IcoInstagram size={size} color={color}/>;
  if (type==="tiktok") return <span style={{fontSize:size-2,color,fontWeight:700}}>♪</span>;
  if (type==="x") return <span style={{fontSize:size-2,fontWeight:800,color}}>𝕏</span>;
  if (type==="phone") return <IcoPhone size={size} color={color}/>;
  return null;
}

function getSocialUrl(platform, handle) {
  const p = PLATFORMS.find(pl => pl.key === platform);
  if (!p || !handle) return null;
  const clean = handle.replace(/^@/, '').trim();
  return p.url(clean);
}

  const [hasSelfie, setHasSelfie] = useState(false);
  const [selfieGrad] = useState(() => {
    const g=["linear-gradient(135deg,#f093fb,#f5576c)","linear-gradient(135deg,#4facfe,#00f2fe)","linear-gradient(135deg,#43e97b,#38f9d7)","linear-gradient(135deg,#fa709a,#fee140)","linear-gradient(135deg,#a18cd1,#fbc2eb)"];
    return g[Math.floor(Math.random()*g.length)];
  });
  const [socialValues, setSocialValues] = useState({ig:"",tiktok:"",x:"",phone:""});
  const [visible, setVisible] = useState(false);
  useEffect(() => { setTimeout(() => setVisible(true), 50); }, []);
  const updateSocial = (key, val) => { setSocialValues(p => ({...p,[key]:val.replace(/^@/,'')})); };
  const canSubmit = name.trim().length > 1 && hasSelfie;
  const handleSubmit = () => {
    if (!canSubmit) return;
    const socials={};
    Object.entries(socialValues).forEach(([k,v]) => { if(v.trim()) socials[k]=v.trim(); });
    onComplete({name:name.trim(),hasSelfie,selfieGrad,socials});
  };

  return (
    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:90,display:"flex",flexDirection:"column",padding:"48px 24px 40px",overflowY:"auto",transition:"opacity 0.4s",opacity:visible?1:0}} className="no-scrollbar">
      <div style={{animation:"fadeUp 0.6s ease-out"}}>
        <p style={{color:C.teal,fontSize:12,letterSpacing:4,fontWeight:600,marginBottom:8}}>STEP INTO THE CREW</p>
        <h2 style={{fontSize:28,fontWeight:800,color:C.white,marginBottom:4}}>Join the Crew</h2>
        <p style={{color:C.gray,fontSize:14,lineHeight:1.5,marginBottom:28}}>Snap a selfie and share your handles to connect with others today.</p>
      </div>
      {/* Selfie */}
      <div style={{animation:"fadeUp 0.6s ease-out 0.1s both",marginBottom:24,textAlign:"center"}}>
        <label style={{color:C.grayLight,fontSize:12,fontWeight:600,letterSpacing:2,display:"block",marginBottom:12}}>YOUR CHECK-IN PHOTO</label>
        {!hasSelfie ? (
          <button onClick={()=>setHasSelfie(true)} style={{width:120,height:120,borderRadius:28,background:C.card,border:`2px dashed ${C.teal}44`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,margin:"0 auto"}}>
            <IcoCamera size={28} color={C.teal}/><span style={{fontSize:11,color:C.teal,fontWeight:600}}>Take Selfie</span>
          </button>
        ) : (
          <div style={{position:"relative",display:"inline-block"}}>
            <div style={{width:120,height:120,borderRadius:28,background:selfieGrad,display:"flex",alignItems:"center",justifyContent:"center",border:`3px solid ${C.teal}`,animation:"scaleIn 0.3s ease-out"}}>
              <span style={{fontSize:40,filter:"drop-shadow(0 2px 8px rgba(0,0,0,0.3))"}}>😎</span>
            </div>
            <div style={{position:"absolute",bottom:-4,right:-4,width:28,height:28,borderRadius:14,background:C.teal,display:"flex",alignItems:"center",justifyContent:"center"}}><IcoCheck size={16} color={C.bg}/></div>
          </div>
        )}
        {hasSelfie && <p style={{color:C.teal,fontSize:11,marginTop:8,fontWeight:500}}>Looking good! This will be your profile pic.</p>}
      </div>
      {/* Name */}
      <div style={{animation:"fadeUp 0.6s ease-out 0.2s both",marginBottom:24}}>
        <label style={{color:C.grayLight,fontSize:12,fontWeight:600,letterSpacing:2,display:"block",marginBottom:8}}>YOUR NAME</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Enter your name" style={{width:"100%",padding:"14px 16px",borderRadius:12,fontSize:16,color:C.white,background:C.card,border:`1px solid ${C.grayDark}`,outline:"none"}} onFocus={e=>e.target.style.borderColor=C.teal} onBlur={e=>e.target.style.borderColor=C.grayDark}/>
      </div>
      {/* Socials — always visible, handle-only inputs */}
      <div style={{animation:"fadeUp 0.6s ease-out 0.3s both",marginBottom:32}}>
        <label style={{color:C.grayLight,fontSize:12,fontWeight:600,letterSpacing:2,display:"block",marginBottom:12}}>YOUR SOCIALS <span style={{color:C.grayDark,fontWeight:400,letterSpacing:0}}>just type your username</span></label>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {PLATFORMS.map(({key,placeholder,label})=>(
            <div key={key} style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:40,height:40,borderRadius:12,background:`${C.teal}12`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <PlatformIcon type={key} size={18} color={socialValues[key]?C.teal:C.grayDark}/>
              </div>
              <div style={{flex:1,position:"relative"}}>
                <input value={socialValues[key]} onChange={e=>updateSocial(key,e.target.value)} placeholder={placeholder}
                  style={{width:"100%",padding:"12px 14px",borderRadius:12,fontSize:14,color:C.white,background:C.card,border:`1px solid ${socialValues[key]?C.teal+"44":C.grayDark}`,outline:"none",transition:"border-color 0.15s"}}
                  onFocus={e=>e.target.style.borderColor=C.teal} onBlur={e=>e.target.style.borderColor=socialValues[key]?C.teal+"44":C.grayDark}/>
              </div>
              <span style={{fontSize:10,color:C.grayDark,fontWeight:600,letterSpacing:0.5,minWidth:52}}>{label}</span>
            </div>
          ))}
        </div>
        <p style={{color:C.grayDark,fontSize:11,marginTop:8}}>Skip any you don't want to share. You can add them later from your profile.</p>
      </div>
      <button onClick={handleSubmit} style={{padding:"16px",borderRadius:16,fontWeight:700,fontSize:16,letterSpacing:1,color:canSubmit?C.bg:C.grayDark,background:canSubmit?C.gradient:C.card,opacity:canSubmit?1:0.5,transition:"all 0.2s",animation:"fadeUp 0.6s ease-out 0.4s both",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>LET'S GO <IcoArrow size={18} color={canSubmit?C.bg:C.grayDark}/></button>
      {!hasSelfie && name.trim().length > 1 && <p style={{color:C.gray,fontSize:11,textAlign:"center",marginTop:12}}>Take a selfie to continue — it's your check-in!</p>}
    </div>
  );
}

// PROFILE MODAL — with real social links

function ProfileModal({ person, onClose, onConnect, isConnected, isYou, onEditProfile }) {
  if (!person) return null;
  const socialEntries = person.socials ? Object.entries(person.socials) : [];
  return (
    <div style={{position:"fixed",inset:0,zIndex:80,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,0.7)",backdropFilter:"blur(4px)"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:430,background:C.card,borderRadius:"24px 24px 0 0",padding:"24px 24px 40px",animation:"slideUp 0.3s ease-out"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <span style={{fontSize:12,color:C.gray,fontWeight:600,letterSpacing:2}}>{isYou?"YOUR PROFILE":"CREW MEMBER"}</span>
          <button onClick={onClose} style={{color:C.gray}}><IcoX size={20} color={C.gray}/></button>
        </div>
        <div style={{textAlign:"center",marginBottom:20}}>
          {person.selfie ? (
            <div style={{width:80,height:80,borderRadius:24,background:person.selfieGrad,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",border:`3px solid ${C.teal}44`}}><span style={{fontSize:36}}>{person.avatar}</span></div>
          ) : (<div style={{fontSize:56,marginBottom:12}}>{person.avatar}</div>)}
          <h3 style={{fontSize:22,fontWeight:700,color:C.white,marginBottom:4}}>{person.name}</h3>
          {person.zone && <div style={{display:"inline-flex",alignItems:"center",gap:4,background:`${C.teal}15`,padding:"4px 12px",borderRadius:20}}><div style={{width:6,height:6,borderRadius:3,background:C.teal}}/><span style={{fontSize:11,color:C.teal,fontWeight:600}}>{person.zone} Zone</span></div>}
        </div>
        {/* Social links — tappable to open profiles */}
        {socialEntries.length > 0 && <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {socialEntries.map(([platform,handle])=>{
            const url = getSocialUrl(platform, handle);
            const platInfo = PLATFORMS.find(p=>p.key===platform);
            return (
              <a key={platform} href={url} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:12,background:C.bg,padding:"12px 16px",borderRadius:12,textDecoration:"none",transition:"background 0.15s"}}
                onMouseDown={e=>e.currentTarget.style.background=C.cardHover} onMouseUp={e=>e.currentTarget.style.background=C.bg}>
                <PlatformIcon type={platform} size={18} color={C.teal}/>
                <div style={{flex:1}}><span style={{color:C.white,fontSize:14}}>{handle}</span></div>
                <span style={{color:C.teal,fontSize:10,fontWeight:600,letterSpacing:1}}>{platInfo?.label.toUpperCase()} →</span>
              </a>
            );
          })}
        </div>}
        {socialEntries.length === 0 && !isYou && (
          <div style={{background:`${C.grayDark}22`,borderRadius:12,padding:16,textAlign:"center",marginBottom:16}}>
            <p style={{color:C.gray,fontSize:13}}>No socials shared yet.</p>
          </div>
        )}
        {isYou ? (
          <button onClick={onEditProfile} style={{width:"100%",padding:"14px",borderRadius:14,fontWeight:700,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:8,color:C.teal,background:`${C.teal}15`,border:`1px solid ${C.teal}33`,transition:"all 0.2s"}}>
            <IcoEdit size={16} color={C.teal}/> Edit Profile
          </button>
        ) : (
          <button onClick={()=>onConnect(person.id)} style={{width:"100%",padding:"14px",borderRadius:14,fontWeight:700,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:8,color:isConnected?C.teal:C.bg,background:isConnected?`${C.teal}15`:C.gradient,border:isConnected?`1px solid ${C.teal}33`:"none",transition:"all 0.2s"}}>
            {isConnected ? <><IcoCheck size={18} color={C.teal}/> Connected</> : <><IcoShare size={18} color={C.bg}/> Connect</>}
          </button>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// EDIT PROFILE MODAL
// ═══════════════════════════════════════════════════════════

function EditProfileModal({ profile, onSave, onClose }) {
  const [socials, setSocials] = useState(profile?.socials || {});
  const updateSocial = (key, val) => setSocials(p => ({...p,[key]:val.replace(/^@/,'')}));
  const handleSave = () => {
    const cleaned = {};
    Object.entries(socials).forEach(([k,v]) => { if(v.trim()) cleaned[k]=v.trim(); });
    onSave(cleaned);
  };
  return (
    <div style={{position:"fixed",inset:0,zIndex:85,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,0.7)",backdropFilter:"blur(4px)"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:430,background:C.card,borderRadius:"24px 24px 0 0",padding:"24px 24px 40px",animation:"slideUp 0.3s ease-out"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h3 style={{fontSize:18,fontWeight:700,color:C.white}}>Edit Profile</h3>
          <button onClick={onClose}><IcoX size={20} color={C.gray}/></button>
        </div>
        <p style={{color:C.gray,fontSize:13,marginBottom:20}}>Update your social handles. Just type your username — no @ needed.</p>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
          {PLATFORMS.map(({key,placeholder,label})=>(
            <div key={key} style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:40,height:40,borderRadius:12,background:`${C.teal}12`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <PlatformIcon type={key} size={18} color={socials[key]?C.teal:C.grayDark}/>
              </div>
              <input value={socials[key]||""} onChange={e=>updateSocial(key,e.target.value)} placeholder={placeholder}
                style={{flex:1,padding:"12px 14px",borderRadius:12,fontSize:14,color:C.white,background:C.bg,border:`1px solid ${socials[key]?C.teal+"44":C.grayDark}`,outline:"none"}}
                onFocus={e=>e.target.style.borderColor=C.teal} onBlur={e=>e.target.style.borderColor=socials[key]?C.teal+"44":C.grayDark}/>
              <span style={{fontSize:10,color:C.grayDark,fontWeight:600,minWidth:52}}>{label}</span>
            </div>
          ))}
        </div>
        <button onClick={handleSave} style={{width:"100%",padding:"16px",borderRadius:14,fontWeight:700,fontSize:16,color:C.bg,background:C.gradient,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <IcoCheck size={18} color={C.bg}/> Save Changes
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// CREW BOARD — tappable cards with social links
// ═══════════════════════════════════════════════════════════

function CrewBoard({ profile, connections, onConnect, onUpdateProfile }) {
  const [selectedPerson, setSelectedPerson] = useState(null);
  const [showEdit, setShowEdit] = useState(false);
  const [selectedIsYou, setSelectedIsYou] = useState(false);
  const userEntry = profile ? {id:0,name:profile.name,avatar:"😎",selfie:true,selfieGrad:profile.selfieGrad,socials:profile.socials,zone:"Beach",isYou:true} : null;
  const allCrew = userEntry ? [userEntry,...DEMO_CREW] : DEMO_CREW;
  const hasSocials = profile && Object.keys(profile.socials||{}).length > 0;

  const handleCardTap = (person) => {
    setSelectedPerson(person);
    setSelectedIsYou(!!person.isYou);
  };

  const handleEditProfile = () => {
    setSelectedPerson(null);
    setShowEdit(true);
  };

  const handleSaveProfile = (newSocials) => {
    onUpdateProfile(newSocials);
    setShowEdit(false);
  };

  return (
    <div style={{padding:"20px 16px",animation:"fadeUp 0.4s ease-out"}} className="no-scrollbar">
      {!hasSocials && (
        <button onClick={()=>{setSelectedPerson(userEntry);setSelectedIsYou(true);}} style={{width:"100%",background:`${C.lime}08`,border:`1px solid ${C.lime}22`,borderRadius:14,padding:"12px 16px",marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
          <IcoSparkle size={16} color={C.lime}/><span style={{color:C.lime,fontSize:13,fontWeight:500}}>Tap here to add your socials and unlock connections</span>
        </button>
      )}
      {hasSocials && (
        <div style={{background:`${C.teal}10`,border:`1px solid ${C.teal}20`,borderRadius:14,padding:"12px 16px",marginBottom:20,display:"flex",alignItems:"center",gap:10}}><IcoCheck size={16} color={C.teal}/><span style={{color:C.teal,fontSize:13,fontWeight:500}}>You're sharing — tap anyone to connect!</span></div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h3 style={{fontSize:18,fontWeight:700,color:C.white}}>Today's Crew</h3>
        <span style={{fontSize:12,color:C.gray}}>{allCrew.length} people</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:10}}>
        {allCrew.map((person,i)=>{const connected=connections.has(person.id);return(
          <button key={person.id} onClick={()=>handleCardTap(person)} style={{background:C.card,borderRadius:16,padding:"18px 14px",textAlign:"center",border:person.isYou?`1px solid ${C.teal}33`:`1px solid ${C.grayDark}33`,transition:"all 0.15s",position:"relative",animation:`fadeUp 0.4s ease-out ${i*0.04}s both`}} onMouseDown={e=>e.currentTarget.style.transform="scale(0.97)"} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}>
            {person.isYou && <div style={{position:"absolute",top:8,right:8,fontSize:9,color:C.teal,fontWeight:700,letterSpacing:1,background:`${C.teal}15`,padding:"2px 8px",borderRadius:10}}>YOU</div>}
            {connected && <div style={{position:"absolute",top:8,left:8,width:18,height:18,borderRadius:9,background:C.teal,display:"flex",alignItems:"center",justifyContent:"center"}}><IcoCheck size={11} color={C.bg} sw={3}/></div>}
            {person.selfie ? (
              <div style={{width:52,height:52,borderRadius:16,background:person.selfieGrad,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 8px",border:`2px solid ${C.grayDark}44`}}><span style={{fontSize:24}}>{person.avatar}</span></div>
            ) : (<div style={{fontSize:36,marginBottom:8}}>{person.avatar}</div>)}
            <div style={{fontSize:14,fontWeight:600,color:C.white,marginBottom:2}}>{person.name.split(" ")[0]}</div>
            <div style={{fontSize:11,color:C.gray}}>{person.name.split(" ")[1]||""}</div>
            {person.socials && Object.keys(person.socials).length > 0 && <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:6}}>{Object.keys(person.socials).map(k=><div key={k} style={{width:18,height:18,borderRadius:5,background:`${C.teal}15`,display:"flex",alignItems:"center",justifyContent:"center"}}><PlatformIcon type={k} size={10} color={C.teal}/></div>)}</div>}
          </button>
        );})}
      </div>
      <ProfileModal person={selectedPerson} onClose={()=>setSelectedPerson(null)} onConnect={onConnect} isConnected={selectedPerson?connections.has(selectedPerson.id):false} isYou={selectedIsYou} onEditProfile={handleEditProfile}/>
      {showEdit && <EditProfileModal profile={profile} onSave={handleSaveProfile} onClose={()=>setShowEdit(false)}/>}
    </div>
  );
}

// MOMENTS FEED — with photo upload UI
// ═══════════════════════════════════════════════════════════

function MomentsFeed({ profile }) {
  const [zoneFilter, setZoneFilter] = useState("All");
  const [liked, setLiked] = useState(new Set());
  const [galleryExpanded, setGalleryExpanded] = useState(false);
  const [uploads, setUploads] = useState([]);
  const [showUpload, setShowUpload] = useState(false);

  const allMoments = [...uploads, ...(profile?.hasSelfie ? [{id:99,zone:"Beach",uploader:"You",avatar:"😎",gradient:profile.selfieGrad,time:"Just now",likes:3,caption:`${profile.name} just checked in! Let's go! 🤙`,checkin:true,overlay:"😎"}] : []), ...DEMO_MOMENTS];
  const filtered = zoneFilter==="All" ? allMoments : allMoments.filter(m=>m.zone===zoneFilter);
  const toggleLike = (id) => { setLiked(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;}); };

  const simulateUpload = () => {
    const grads = MOMENT_GRADIENTS;
    const newMoment = {
      id: Date.now(), zone: ZONES[1+Math.floor(Math.random()*4)],
      uploader: profile?.name || "You", avatar: "😎",
      gradient: grads[Math.floor(Math.random()*grads.length)],
      time: "Just now", likes: 0, caption: "Fresh from the disposable camera! 📸",
      checkin: false, overlay: "📷", isUpload: true,
    };
    setUploads(p => [newMoment, ...p]);
    setShowUpload(false);
  };

  return (
    <div style={{padding:"20px 16px"}} className="no-scrollbar">
      {/* Upload CTA */}
      <div style={{background:`linear-gradient(135deg,${C.teal}15,${C.cyan}10)`,border:`1px solid ${C.teal}33`,borderRadius:16,padding:20,marginBottom:20,textAlign:"center",animation:"fadeUp 0.4s ease-out"}}>
        <IcoUpload size={28} color={C.teal}/>
        <h4 style={{color:C.white,fontSize:16,fontWeight:700,marginTop:8,marginBottom:4}}>Upload Your Camera Shots</h4>
        <p style={{color:C.gray,fontSize:12,lineHeight:1.5,marginBottom:14}}>Drop those disposable camera pics here — they'll show up for the whole crew instantly.</p>
        <button onClick={simulateUpload} style={{padding:"12px 28px",borderRadius:12,color:C.bg,fontWeight:700,fontSize:14,background:C.gradient,display:"inline-flex",alignItems:"center",gap:8}}>
          <IcoCamera size={16} color={C.bg}/> Upload Photos
        </button>
      </div>
      {/* Upload count */}
      {uploads.length > 0 && (
        <div style={{background:`${C.lime}08`,border:`1px solid ${C.lime}22`,borderRadius:12,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
          <IcoCheck size={14} color={C.lime}/><span style={{color:C.lime,fontSize:12,fontWeight:600}}>{uploads.length} photo{uploads.length>1?"s":""} uploaded — visible to the crew!</span>
        </div>
      )}

              {m.checkin && !m.isUpload && <div style={{position:"absolute",top:12,left:12,background:`${C.teal}cc`,backdropFilter:"blur(8px)",padding:"4px 10px",borderRadius:10}}><span style={{fontSize:10,color:C.white,fontWeight:700,letterSpacing:1}}>CHECK-IN</span></div>}
              {!m.checkin && !m.isUpload && <div style={{position:"absolute",top:12,right:12,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(8px)",padding:"4px 10px",borderRadius:10}}><span style={{fontSize:10,color:C.white,fontWeight:600}}>{m.zone}</span></div>}
              <div style={{fontSize:48,color:"rgba(255,255,255,0.3)"}}>{m.overlay}</div>
            </div>
            <div style={{padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>{m.avatar}</span><span style={{fontSize:13,fontWeight:600,color:C.white}}>{m.uploader}</span><span style={{fontSize:11,color:C.grayDark}}>·</span><span style={{fontSize:11,color:C.gray}}>{m.time}</span></div>
                <button onClick={()=>toggleLike(m.id)} style={{display:"flex",alignItems:"center",gap:4}}><IcoHeart size={16} color={isLiked?"#ff4d6a":C.grayDark} fill={isLiked?"#ff4d6a":"none"}/><span style={{fontSize:12,color:isLiked?"#ff4d6a":C.gray}}>{m.likes+(isLiked?1:0)}</span></button>

              <p style={{fontSize:13,color:C.grayLight,lineHeight:1.5}}>{m.caption}</p>

          </div>
        );})}
      </div>
    </div>
  );
}

// SCAVENGER HUNT
// ═══════════════════════════════════════════════════════════

function ScavengerHunt() {
  const [unlocked, setUnlocked] = useState(new Set());
  const [shuffledOrder, setShuffledOrder] = useState(null);
  const [showRules, setShowRules] = useState(true);
  const [firstVisit, setFirstVisit] = useState(true);
  const [activeClue, setActiveClue] = useState(null);
  const [scanStep, setScanStep] = useState(null); // 'scan' | 'selfie' | 'reveal'
  const [revealedWord, setRevealedWord] = useState(null);
  const [nextRiddle, setNextRiddle] = useState(null);

  const progress = unlocked.size;
  const isComplete = progress === 7;

  // Get the ordered phrase words
  const phraseWords = FULL_PHRASE.split(" ");

  // Shuffle remaining clues for this user (after first pick)
  const shuffleRemaining = (excludeIds) => {
    const remaining = HUNT_CLUES.filter(c => !excludeIds.has(c.id));
    for (let i = remaining.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
    }
    return remaining.map(c => c.id);
  };

  const getNextUnfound = (currentUnlocked) => {
    if (!shuffledOrder) return null;
    return shuffledOrder.find(id => !currentUnlocked.has(id)) || null;
  };

  const handlePickFirst = (clueId) => {
    const newUnlocked = new Set();
    // Create shuffled order excluding the first pick
    const order = shuffleRemaining(new Set([clueId]));
    setShuffledOrder(order);
    setActiveClue(clueId);
    setScanStep('scan');
  };

  const handleScan = () => {
    setScanStep('selfie');
  };

  const handleSelfie = () => {
    const clue = HUNT_CLUES.find(c => c.id === activeClue);
    const newUnlocked = new Set([...unlocked, activeClue]);
    setUnlocked(newUnlocked);
    setRevealedWord(clue.word);
    setScanStep('reveal');

    // Find next clue riddle
    if (newUnlocked.size < 7) {
      const nextId = (shuffledOrder || []).find(id => !newUnlocked.has(id));
      if (nextId) {
        const nextClue = HUNT_CLUES.find(c => c.id === nextId);
        setNextRiddle(nextClue);
      }
    }
  };

  const handleCloseReveal = () => {
    setScanStep(null);
    setActiveClue(null);
    setRevealedWord(null);
  };

  const handleTileClick = (clueId) => {
    if (unlocked.has(clueId)) return; // already found
    if (!shuffledOrder && !unlocked.size) {
      // First pick
      handlePickFirst(clueId);
    } else {
      setActiveClue(clueId);
      setScanStep('scan');
    }
  };

  const dismissRules = () => {
    setShowRules(false);
    setFirstVisit(false);
  };

  return (
    <div style={{padding:"20px 16px",animation:"fadeUp 0.4s ease-out"}} className="no-scrollbar">
      {/* Header */}
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:36,marginBottom:8}}>🗺️</div>
        <h3 className="gradient-text" style={{fontSize:20,fontWeight:800,letterSpacing:1,marginBottom:4}}>ISLAND SCAVENGER HUNT</h3>
        <p style={{color:C.gray,fontSize:13,lineHeight:1.5}}>Find all 7 clues to unlock the secret phrase.</p>
        <button onClick={()=>setShowRules(true)} style={{marginTop:8,fontSize:11,color:C.teal,fontWeight:600,background:`${C.teal}15`,padding:"4px 14px",borderRadius:20,border:`1px solid ${C.teal}33`}}>
          📋 Rules
        </button>
      </div>

      {/* Progress Bar */}
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:12,fontWeight:600,color:C.grayLight}}>{progress}/7 CLUES FOUND</span>
          {progress > 0 && <span style={{fontSize:11,color:C.teal,fontWeight:600}}>{Math.round(progress/7*100)}%</span>}
        </div>
        <div style={{height:8,borderRadius:4,background:C.grayDark,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${progress/7*100}%`,background:C.gradient,borderRadius:4,transition:"width 0.5s ease-out"}}/>
        </div>
      </div>

      {/* Secret Phrase Progress */}
      <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:20,border:`1px solid ${C.grayDark}33`}}>
        <label style={{color:C.grayLight,fontSize:11,fontWeight:600,letterSpacing:2,display:"block",marginBottom:10}}>SECRET PHRASE</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
          {HUNT_CLUES.map((clue, i) => (
            <div key={clue.id} style={{padding:"6px 12px",borderRadius:8,fontSize:13,fontWeight:700,letterSpacing:0.5,
              background:unlocked.has(clue.id)?`${C.teal}20`:C.bg,
              color:unlocked.has(clue.id)?C.teal:C.grayDark,
              border:`1px solid ${unlocked.has(clue.id)?C.teal+"44":C.grayDark+"44"}`,
              transition:"all 0.3s"
            }}>
              {unlocked.has(clue.id) ? clue.word : "???"}
            </div>
          ))}
        </div>
        {isComplete && (
          <div style={{textAlign:"center",marginTop:12,animation:"scaleIn 0.4s ease-out"}}>
            <p style={{color:C.lime,fontSize:14,fontWeight:700}}>🎉 "{FULL_PHRASE}"</p>
            <p style={{color:C.gray,fontSize:11,marginTop:4}}>Show this to the cabana to claim your prize!</p>
          </div>
        )}
      </div>

      {/* Next Clue Riddle */}
      {nextRiddle && !scanStep && !isComplete && unlocked.size > 0 && (
        <div style={{background:`linear-gradient(135deg,${nextRiddle.color}15,${C.card})`,border:`1px solid ${nextRiddle.color}33`,borderRadius:16,padding:16,marginBottom:20,animation:"fadeUp 0.4s ease-out"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <IcoSparkle size={16} color={nextRiddle.color}/>
            <span style={{fontSize:12,fontWeight:700,color:nextRiddle.color,letterSpacing:1}}>YOUR NEXT CLUE</span>
          </div>
          <p style={{color:C.white,fontSize:14,lineHeight:1.6,fontStyle:"italic"}}>"{nextRiddle.riddle}"</p>
          <p style={{color:C.gray,fontSize:11,marginTop:8}}>Find the QR code at this spot and scan it!</p>
        </div>
      )}

      {/* Instruction for first time */}
      {unlocked.size === 0 && !scanStep && (
        <div style={{background:`${C.cyan}10`,border:`1px solid ${C.cyan}22`,borderRadius:14,padding:"12px 16px",marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>👇</span>
          <span style={{color:C.cyan,fontSize:13,fontWeight:500}}>Pick a clue to start your hunt! The name is your first hint.</span>
        </div>
      )}

      {/* Clue Tiles */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
        {HUNT_CLUES.map((clue,i) => {
          const found = unlocked.has(clue.id);
          return (
            <button key={clue.id} onClick={()=>!found&&handleTileClick(clue.id)} style={{
              background:found?`${clue.color}12`:C.card,
              borderRadius:16, padding:"20px 14px", textAlign:"center",
              border:found?`1px solid ${clue.color}44`:`1px solid ${C.grayDark}33`,
              transition:"all 0.2s", position:"relative",
              animation:`fadeUp 0.3s ease-out ${i*0.05}s both`,
              opacity:found?0.8:1,
            }} onMouseDown={e=>{if(!found)e.currentTarget.style.transform="scale(0.95)"}} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}>
              {found && <div style={{position:"absolute",top:8,right:8}}><IcoCheck size={16} color={clue.color} sw={3}/></div>}
              <div style={{fontSize:32,marginBottom:6}}>{clue.emoji}</div>
              <div style={{fontSize:13,fontWeight:700,color:found?clue.color:C.white,marginBottom:2}}>{clue.name}</div>
              {found ? (
                <div style={{fontSize:12,fontWeight:800,color:clue.color,marginTop:4}}>"{clue.word}"</div>
              ) : (
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,marginTop:4}}>
                  <IcoLock size={12} color={C.grayDark}/>
                  <span style={{fontSize:11,color:C.grayDark}}>Locked</span>
                </div>
              )}
            </button>
          );
        })}
      </div>

      {/* Prize Info */}
      <div style={{background:C.card,borderRadius:16,padding:16,marginTop:20,border:`1px solid ${C.grayDark}33`,textAlign:"center"}}>
        <span style={{fontSize:24}}>🏆</span>
        <p style={{color:C.white,fontSize:14,fontWeight:700,marginTop:6}}>First 3 to finish win a special prize!</p>
        <p style={{color:C.gray,fontSize:12,marginTop:4}}>Complete the phrase and show it to the cabana.</p>
      </div>

      {/* RULES MODAL */}
      {showRules && (
        <div style={{position:"fixed",inset:0,zIndex:80,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,0.7)",backdropFilter:"blur(4px)"}} onClick={dismissRules}>
          <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:430,background:C.card,borderRadius:"24px 24px 0 0",padding:"24px 24px 40px",animation:"slideUp 0.3s ease-out",maxHeight:"80vh",overflowY:"auto"}} className="no-scrollbar">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h3 style={{fontSize:20,fontWeight:800,color:C.white}}>🗺️ Hunt Rules</h3>
              <button onClick={dismissRules}><IcoX size={20} color={C.gray}/></button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style={{width:32,height:32,borderRadius:10,background:`${C.teal}20`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14,fontWeight:800,color:C.teal}}>1</div>
                <div><p style={{color:C.white,fontSize:14,fontWeight:600,marginBottom:2}}>Pick your first clue</p><p style={{color:C.gray,fontSize:12,lineHeight:1.5}}>Choose any clue tile to start. The name hints at the location!</p></div>
              </div>
              <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style={{width:32,height:32,borderRadius:10,background:`${C.cyan}20`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14,fontWeight:800,color:C.cyan}}>2</div>
                <div><p style={{color:C.white,fontSize:14,fontWeight:600,marginBottom:2}}>Find & scan the QR code</p><p style={{color:C.gray,fontSize:12,lineHeight:1.5}}>Head to the spot, find the hidden QR code, and scan it with the app.</p></div>
              </div>
              <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style={{width:32,height:32,borderRadius:10,background:`${C.lime}20`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14,fontWeight:800,color:C.lime}}>3</div>
                <div><p style={{color:C.white,fontSize:14,fontWeight:600,marginBottom:2}}>Take a selfie to unlock</p><p style={{color:C.gray,fontSize:12,lineHeight:1.5}}>Snap a selfie with the QR code to prove you were there. This unlocks your puzzle piece!</p></div>
              </div>
              <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style={{width:32,height:32,borderRadius:10,background:`${C.orange}20`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14,fontWeight:800,color:C.orange}}>4</div>
                <div><p style={{color:C.white,fontSize:14,fontWeight:600,marginBottom:2}}>Get your next riddle</p><p style={{color:C.gray,fontSize:12,lineHeight:1.5}}>Each unlock reveals a riddle leading to your next clue. Your path is unique!</p></div>
              </div>
              <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style={{width:32,height:32,borderRadius:10,background:`${C.coral}20`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14,fontWeight:800,color:C.coral}}>5</div>
                <div><p style={{color:C.white,fontSize:14,fontWeight:600,marginBottom:2}}>Complete the phrase & win!</p><p style={{color:C.gray,fontSize:12,lineHeight:1.5}}>Collect all 7 words, say the phrase at the cabana. First 3 to finish get the best prizes!</p></div>
              </div>
            </div>
            <button onClick={dismissRules} style={{width:"100%",padding:16,borderRadius:14,fontWeight:700,fontSize:16,color:C.bg,background:C.gradient,marginTop:24,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              Let's Hunt! <IcoArrow size={18} color={C.bg}/>
            </button>
          </div>
        </div>
      )}

      {/* SCAN/SELFIE/REVEAL MODAL */}
      {scanStep && (
        <div style={{position:"fixed",inset:0,zIndex:80,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.85)",backdropFilter:"blur(8px)"}}>
          <div style={{width:"100%",maxWidth:380,background:C.card,borderRadius:24,padding:32,textAlign:"center",animation:"scaleIn 0.3s ease-out",margin:16}}>
            {scanStep === 'scan' && (
              <>
                <div style={{width:80,height:80,borderRadius:20,background:`${C.teal}15`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",animation:"glow 2s infinite"}}>
                  <IcoScan size={36} color={C.teal}/>
                </div>
                <h3 style={{fontSize:20,fontWeight:800,color:C.white,marginBottom:6}}>Scan QR Code</h3>
                <p style={{color:C.gray,fontSize:13,lineHeight:1.5,marginBottom:24}}>Point your camera at the QR code at the <span style={{color:HUNT_CLUES.find(c=>c.id===activeClue)?.color,fontWeight:700}}>{HUNT_CLUES.find(c=>c.id===activeClue)?.name}</span> spot.</p>
                <button onClick={handleScan} style={{width:"100%",padding:16,borderRadius:14,fontWeight:700,fontSize:16,color:C.bg,background:C.gradient,marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <IcoScan size={18} color={C.bg}/> Scan Now (Demo)
                </button>
                <button onClick={()=>{setScanStep(null);setActiveClue(null);}} style={{color:C.gray,fontSize:13,fontWeight:500,padding:8}}>Cancel</button>
              </>
            )}
            {scanStep === 'selfie' && (
              <>
                <div style={{width:80,height:80,borderRadius:20,background:`${C.cyan}15`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
                  <IcoCamera size={36} color={C.cyan}/>
                </div>
                <h3 style={{fontSize:20,fontWeight:800,color:C.white,marginBottom:6}}>Take a Selfie!</h3>
                <p style={{color:C.gray,fontSize:13,lineHeight:1.5,marginBottom:24}}>Snap a selfie with the QR code to prove you found it.</p>
                <button onClick={handleSelfie} style={{width:"100%",padding:16,borderRadius:14,fontWeight:700,fontSize:16,color:C.bg,background:`linear-gradient(135deg,${C.cyan},${C.teal})`,marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <IcoCamera size={18} color={C.bg}/> Take Selfie (Demo)
                </button>
              </>
            )}
            {scanStep === 'reveal' && (
              <>
                <div style={{fontSize:48,marginBottom:12,animation:"float 2s ease-in-out infinite"}}>{HUNT_CLUES.find(c=>c.id===activeClue)?.emoji}</div>
                <h3 style={{fontSize:20,fontWeight:800,color:C.white,marginBottom:4}}>Puzzle Piece Unlocked!</h3>
                <div style={{display:"inline-block",padding:"10px 24px",borderRadius:12,background:`${C.teal}20`,border:`2px solid ${C.teal}44`,marginTop:8,marginBottom:16}}>
                  <span style={{fontSize:24,fontWeight:800,color:C.teal}}>{revealedWord}</span>
                </div>
                <p style={{color:C.gray,fontSize:12,marginBottom:6}}>{progress}/7 pieces collected</p>
                {nextRiddle && !isComplete && (
                  <div style={{background:C.bg,borderRadius:14,padding:14,marginTop:12,marginBottom:8,textAlign:"left",border:`1px solid ${nextRiddle.color}33`}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                      <IcoSparkle size={14} color={nextRiddle.color}/>
                      <span style={{fontSize:11,fontWeight:700,color:nextRiddle.color,letterSpacing:1}}>NEXT CLUE</span>
                    </div>
                    <p style={{color:C.grayLight,fontSize:13,lineHeight:1.5,fontStyle:"italic"}}>"{nextRiddle.riddle}"</p>
                  </div>
                )}
                {isComplete && (
                  <div style={{background:`${C.lime}10`,borderRadius:14,padding:14,marginTop:12,border:`1px solid ${C.lime}33`}}>
                    <p style={{color:C.lime,fontSize:16,fontWeight:800}}>🎉 YOU DID IT!</p>
                    <p style={{color:C.gray,fontSize:12,marginTop:4}}>Head to the cabana and say the phrase to win!</p>
                  </div>
                )}
                <button onClick={handleCloseReveal} style={{width:"100%",padding:14,borderRadius:14,fontWeight:700,fontSize:15,color:C.bg,background:C.gradient,marginTop:16}}>
                  {isComplete ? "View My Puzzle" : "Continue Hunting"}
                </button>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function VibeLayer() {
  return (
    <div style={{padding:"20px 16px",animation:"fadeUp 0.4s ease-out"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:40,marginBottom:12}}>🎵</div>
        <h3 className="gradient-text" style={{fontSize:20,fontWeight:800,letterSpacing:1,marginBottom:6}}>THE OFFICIAL SOUNDTRACK</h3>
        <p style={{color:C.gray,fontSize:13,lineHeight:1.5,maxWidth:280,margin:"0 auto"}}>Ocean waves, beach energy, and the perfect vibe for an unforgettable day on the water.</p>
      </div>
      <div style={{borderRadius:16,overflow:"hidden",background:C.card,border:`1px solid ${C.grayDark}33`,marginBottom:20}}>
        <iframe style={{borderRadius:12,border:"none"}}
          src="https://open.spotify.com/embed/playlist/2hmLDliFT9mW84XHxRUzwx?utm_source=generator&theme=0"
          width="100%" height="352" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"/>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
        {["ocean","waves","sunshine","chill","adventure","golden hour","salt life","endless summer"].map(tag=>(
          <span key={tag} style={{padding:"6px 14px",borderRadius:20,fontSize:11,fontWeight:500,color:C.grayLight,background:C.card,border:`1px solid ${C.grayDark}33`,letterSpacing:0.5}}>#{tag}</span>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// CLOSEOUT
// ═══════════════════════════════════════════════════════════

function Closeout({ profile, connections }) {
  const [rating, setRating] = useState(0);
  const [favMoment, setFavMoment] = useState("");
  const [giveaway, setGiveaway] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const connectedNames = DEMO_CREW.filter(p=>connections.has(p.id)).map(p=>p.name.split(" ")[0]);

  if (submitted) return (
    <div style={{padding:"60px 24px",textAlign:"center",animation:"scaleIn 0.4s ease-out",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh"}}>
      <div style={{fontSize:64,marginBottom:20}}>🎉</div>
      <h3 className="gradient-text" style={{fontSize:26,fontWeight:800,marginBottom:8}}>Thanks for an epic day!</h3>
      <p style={{color:C.gray,fontSize:14,lineHeight:1.6,maxWidth:280}}>Your photos will arrive in your inbox within 24 hours. See you at the next one.</p>
      {giveaway && <div style={{marginTop:24,background:`${C.lime}10`,border:`1px solid ${C.lime}22`,borderRadius:14,padding:"12px 20px",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>🌺</span><span style={{color:C.lime,fontSize:13,fontWeight:600}}>You're entered to win the Hawaiian shirt!</span></div>}
    </div>
  );

  return (
    <div style={{padding:"20px 16px",animation:"fadeUp 0.4s ease-out"}} className="no-scrollbar">
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:36,marginBottom:8}}>🌅</div>
        <h3 style={{fontSize:22,fontWeight:800,color:C.white,marginBottom:4}}>How Was Your Day?</h3>
        <p style={{color:C.gray,fontSize:13}}>Take a sec to reflect on the vibes.</p>
      </div>
      <div style={{textAlign:"center",marginBottom:32}}>
        <label style={{color:C.grayLight,fontSize:12,fontWeight:600,letterSpacing:2,display:"block",marginBottom:12}}>RATE THE VIBES</label>
        <div style={{display:"flex",justifyContent:"center",gap:8}}>
          {[1,2,3,4,5].map(s=><button key={s} onClick={()=>setRating(s)} style={{transition:"transform 0.15s"}} onMouseDown={e=>e.currentTarget.style.transform="scale(0.85)"} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}><IcoStar size={36} color={s<=rating?C.lime:C.grayDark} fill={s<=rating?C.lime:"none"} sw={1.5}/></button>)}
        </div>
        {rating>0 && <p style={{color:C.lime,fontSize:12,marginTop:8,fontWeight:600}}>{rating===5?"Legendary! 🔥":rating===4?"Amazing! ✨":rating===3?"Good vibes! 🌊":rating===2?"It was alright":"Thanks for the feedback"}</p>}
      </div>
      <div style={{marginBottom:24}}>
        <label style={{color:C.grayLight,fontSize:12,fontWeight:600,letterSpacing:2,display:"block",marginBottom:8}}>FAVORITE MOMENT</label>
        <textarea value={favMoment} onChange={e=>setFavMoment(e.target.value)} placeholder="What was the highlight of your day?" rows={3} style={{width:"100%",padding:"14px 16px",borderRadius:14,fontSize:14,color:C.white,background:C.card,border:`1px solid ${C.grayDark}`,outline:"none",resize:"none",lineHeight:1.5}} onFocus={e=>e.target.style.borderColor=C.teal} onBlur={e=>e.target.style.borderColor=C.grayDark}/>
      </div>
      {connectedNames.length > 0 && (
        <div style={{marginBottom:24}}>
          <label style={{color:C.grayLight,fontSize:12,fontWeight:600,letterSpacing:2,display:"block",marginBottom:8}}>YOU CONNECTED WITH</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{connectedNames.map(n=><span key={n} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,color:C.teal,background:`${C.teal}10`,border:`1px solid ${C.teal}22`}}>{n}</span>)}</div>
        </div>
      )}
      <div style={{borderRadius:16,overflow:"hidden",marginBottom:20,border:giveaway?`1px solid ${C.lime}33`:`1px solid ${C.grayDark}`,background:giveaway?`${C.lime}06`:C.card,transition:"all 0.2s"}}>
        <div style={{height:80,background:"linear-gradient(135deg, #00d4aa 0%, #c6f135 50%, #00bcd4 100%)",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
          <span style={{fontSize:40}}>🌺</span>
          <div style={{position:"absolute",top:8,right:10,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(6px)",padding:"3px 10px",borderRadius:10}}><span style={{fontSize:10,color:C.white,fontWeight:700,letterSpacing:1}}>LIMITED EDITION</span></div>
        </div>
        <div style={{padding:16}}>
          <h4 style={{fontSize:16,fontWeight:700,color:C.white,marginBottom:4}}>Win a Sea-Doo Hawaiian Shirt</h4>
          <p style={{fontSize:12,color:C.gray,lineHeight:1.5,marginBottom:12}}>Exclusive Legendary Meetups edition. Rate your day and you're automatically entered!</p>
          <button onClick={()=>setGiveaway(!giveaway)} style={{width:"100%",padding:14,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:giveaway?`${C.lime}15`:C.gradient,color:giveaway?C.lime:C.bg,fontWeight:700,fontSize:14,transition:"all 0.2s"}}>
            {giveaway ? <><IcoCheck size={16} color={C.lime}/> You're Entered!</> : <><IcoSparkle size={16} color={C.bg}/> Enter to Win</>}
          </button>
        </div>
      </div>
      <button onClick={()=>rating>0&&setSubmitted(true)} style={{width:"100%",padding:16,borderRadius:14,fontWeight:700,fontSize:16,letterSpacing:1,color:rating>0?C.bg:C.grayDark,background:rating>0?C.gradient:C.card,opacity:rating>0?1:0.5,transition:"all 0.2s",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        SUBMIT <IcoArrow size={18} color={rating>0?C.bg:C.grayDark}/>
      </button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════

function UnchartedApp() {
  const [screen, setScreen] = useState("splash");
  const [tab, setTab] = useState("crew");
  const [profile, setProfile] = useState(null);
  const [connections, setConnections] = useState(new Set());

  const handleEnter = () => setScreen("onboarding");
  const handleOnboardingComplete = (data) => { setProfile(data); setScreen("main"); };
  const handleConnect = useCallback((id) => {
    setConnections(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  }, []);

  const handleUpdateProfile = useCallback((newSocials) => {
    setProfile(prev => ({...prev, socials: newSocials}));
  }, []);

  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:C.bg,color:C.white,fontFamily:'-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',position:"relative",display:"flex",flexDirection:"column"}}>
      {screen === "splash" && <SplashScreen onEnter={handleEnter}/>}
      {screen === "onboarding" && <OnboardingScreen onComplete={handleOnboardingComplete}/>}
      {screen === "main" && (
        <>
          <Header profile={profile}/>
          <div style={{flex:1,overflowY:"auto"}} className="no-scrollbar">
            {tab === "crew" && <CrewBoard profile={profile} connections={connections} onConnect={handleConnect} onUpdateProfile={handleUpdateProfile}/>}
            {tab === "moments" && <MomentsFeed profile={profile}/>}
            {tab === "hunt" && <ScavengerHunt/>}
            {tab === "vibes" && <VibeLayer/>}
            {tab === "rate" && <Closeout profile={profile} connections={connections}/>}
          </div>
          <BottomNav active={tab} onNav={setTab}/>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<UnchartedApp/>);
</script>
</body>
</html>
