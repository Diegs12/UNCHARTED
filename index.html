function EatsMenu({ cart, setCart }) {
  const [catFilter, setCatFilter] = useState("All");
  const [showCart, setShowCart] = useState(false);
  const filtered = catFilter === "All" ? MENU_ITEMS : MENU_ITEMS.filter(i => i.cat === catFilter);
  const totalItems = Object.values(cart).reduce((s, v) => s + v, 0);
  const totalPrice = MENU_ITEMS.reduce((s, item) => s + (cart[item.id] || 0) * item.price, 0);

  const addItem = (id) => setCart(p => ({ ...p, [id]: (p[id] || 0) + 1 }));
  const removeItem = (id) => setCart(p => { const n = { ...p }; if (n[id] > 1) n[id]--; else delete n[id]; return n; });

  return (
    <div style={{ padding: "20px 16px" }} className="no-scrollbar">
      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 20, animation: "fadeUp 0.4s ease-out" }}>

        <p style={{ color: C.gray, fontSize: 13, lineHeight: 1.5 }}>Crafted exclusively for today's meetup. Order from your phone.</p>
      </div>

      {/* Category Filters */}
      <div style={{ display: "flex", gap: 6, marginBottom: 20, overflowX: "auto", paddingBottom: 4 }} className="no-scrollbar">
        {MENU_CATEGORIES.map(cat => (
          <button key={cat} onClick={() => setCatFilter(cat)} style={{
            padding: "7px 14px", borderRadius: 20, fontSize: 11, fontWeight: 600, letterSpacing: 0.3,
            whiteSpace: "nowrap", transition: "all 0.15s",
            color: catFilter === cat ? C.bg : C.gray,
            background: catFilter === cat ? C.teal : C.card,
            border: catFilter === cat ? "none" : `1px solid ${C.grayDark}44`,
          }}>{cat}</button>
        ))}
      </div>

      {/* Menu Items */}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {filtered.map((item, i) => {
          const qty = cart[item.id] || 0;
          return (
            <div key={item.id} style={{
              background: C.card, borderRadius: 16, padding: "16px",
              border: qty > 0 ? `1px solid ${C.teal}33` : `1px solid ${C.grayDark}33`,
              animation: `fadeUp 0.3s ease-out ${i * 0.04}s both`,
              transition: "border-color 0.2s",
            }}>
              <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
                <div style={{
                  width: 56, height: 56, borderRadius: 14, flexShrink: 0,
                  background: `linear-gradient(135deg, ${C.card}, ${C.grayDark}55)`,
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28,
                }}>{item.emoji}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                    <span style={{ fontSize: 15, fontWeight: 700, color: C.white }}>{item.name}</span>
                    {item.popular && <span style={{ fontSize: 9, fontWeight: 700, color: C.orange, background: `${C.orange}15`, padding: "2px 6px", borderRadius: 6, letterSpacing: 0.5 }}>POPULAR</span>}
                  </div>
                  <p style={{ fontSize: 12, color: C.gray, lineHeight: 1.4, marginBottom: 8 }}>{item.desc}</p>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span style={{ fontSize: 16, fontWeight: 800, color: C.teal }}>${item.price}</span>
                    {qty === 0 ? (
                      <button onClick={() => addItem(item.id)} style={{
                        padding: "8px 20px", borderRadius: 12, fontSize: 12, fontWeight: 700,
                        color: C.teal, background: `${C.teal}15`, border: `1px solid ${C.teal}33`,
                        display: "flex", alignItems: "center", gap: 4, transition: "all 0.15s",
                      }}>
                        <IcoPlus size={14} color={C.teal} /> Add
                      </button>
                    ) : (
                      <div style={{ display: "flex", alignItems: "center", gap: 0, background: `${C.teal}15`, borderRadius: 12, border: `1px solid ${C.teal}33` }}>
                        <button onClick={() => removeItem(item.id)} style={{ padding: "8px 12px", display: "flex", alignItems: "center" }}>
                          <IcoMinus size={14} color={C.teal} />
                        </button>
                        <span style={{ fontSize: 14, fontWeight: 800, color: C.teal, minWidth: 20, textAlign: "center" }}>{qty}</span>
                        <button onClick={() => addItem(item.id)} style={{ padding: "8px 12px", display: "flex", alignItems: "center" }}>
                          <IcoPlus size={14} color={C.teal} />
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Floating Cart Bar */}
      {totalItems > 0 && (
        <div style={{
          position: "fixed", bottom: 72, left: "50%", transform: "translateX(-50%)",
          width: "calc(100% - 32px)", maxWidth: 398,
          background: C.gradient, borderRadius: 16, padding: "14px 20px",
          display: "flex", alignItems: "center", justifyContent: "space-between",
          boxShadow: `0 8px 32px ${C.teal}44`, animation: "slideUp 0.3s ease-out",
          zIndex: 40,
        }} onClick={() => setShowCart(!showCart)}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <IcoCart size={20} color={C.bg} />
            <span style={{ fontSize: 14, fontWeight: 800, color: C.bg }}>{totalItems} item{totalItems > 1 ? "s" : ""}</span>
          </div>
          <span style={{ fontSize: 18, fontWeight: 800, color: C.bg }}>${totalPrice}</span>
        </div>
      )}

      {/* Cart Sheet */}
      {showCart && totalItems > 0 && (
        <div style={{ position: "fixed", inset: 0, zIndex: 70, display: "flex", alignItems: "flex-end", justifyContent: "center", background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)" }} onClick={() => setShowCart(false)}>
          <div onClick={e => e.stopPropagation()} style={{ width: "100%", maxWidth: 430, background: C.card, borderRadius: "24px 24px 0 0", padding: "24px 24px 40px", animation: "slideUp 0.3s ease-out", maxHeight: "70vh", overflowY: "auto" }} className="no-scrollbar">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h3 style={{ fontSize: 18, fontWeight: 800, color: C.white }}>Your Order</h3>
              <button onClick={() => setShowCart(false)}><IcoX size={20} color={C.gray} /></button>
            </div>
            {MENU_ITEMS.filter(item => cart[item.id]).map(item => (
              <div key={item.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 0", borderBottom: `1px solid ${C.grayDark}33` }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 24 }}>{item.emoji}</span>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: C.white }}>{item.name}</div>
                    <div style={{ fontSize: 12, color: C.gray }}>${item.price} × {cart[item.id]}</div>
                  </div>
                </div>
                <span style={{ fontSize: 15, fontWeight: 700, color: C.teal }}>${item.price * cart[item.id]}</span>
              </div>
            ))}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 0 8px", marginTop: 8 }}>
              <span style={{ fontSize: 16, fontWeight: 700, color: C.white }}>Total</span>
              <span className="gradient-text" style={{ fontSize: 22, fontWeight: 800 }}>${totalPrice}</span>
            </div>
            <button style={{
              width: "100%", padding: 16, borderRadius: 14, fontWeight: 700, fontSize: 16, letterSpacing: 1,
              color: C.bg, background: C.gradient, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginTop: 12,
            }}>PLACE ORDER <IcoArrow size={18} color={C.bg} /></button>
            <p style={{ fontSize: 11, color: C.grayDark, textAlign: "center", marginTop: 10 }}>Pick up at the Cabana Bar · ~10 min</p>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// VIBE LAYER

function VibeLayer() {
  return (
    <div style={{ padding: "20px 16px", animation: "fadeUp 0.4s ease-out" }}>
      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>🎵</div>
        <h3 className="gradient-text" style={{ fontSize: 20, fontWeight: 800, letterSpacing: 1, marginBottom: 6 }}>THE OFFICIAL SOUNDTRACK</h3>
        <p style={{ color: C.gray, fontSize: 13, lineHeight: 1.5, maxWidth: 280, margin: "0 auto" }}>Ocean waves, beach energy, and the perfect vibe for an unforgettable day on the water.</p>
      </div>
      <div style={{ borderRadius: 16, overflow: "hidden", background: C.card, border: `1px solid ${C.grayDark}33`, marginBottom: 20 }}>
        <iframe style={{ borderRadius: 12, border: "none" }}
          src="https://open.spotify.com/embed/playlist/2hmLDliFT9mW84XHxRUzwx?utm_source=generator&theme=0"
          width="100%" height="352" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" />
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center" }}>
        {["ocean","waves","sunshine","chill","adventure","golden hour","salt life","endless summer"].map(tag => (
          <span key={tag} style={{ padding: "6px 14px", borderRadius: 20, fontSize: 11, fontWeight: 500, color: C.grayLight, background: C.card, border: `1px solid ${C.grayDark}33`, letterSpacing: 0.5 }}>#{tag}</span>

    </div>

}

// ═══════════════════════════════════════════════════════════
// CLOSEOUT
// ═══════════════════════════════════════════════════════════

function Closeout({ profile, connections }) {
  const [rating, setRating] = useState(0);
  const [favMoment, setFavMoment] = useState("");
  const [giveaway, setGiveaway] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const connectedNames = DEMO_CREW.filter(p => connections.has(p.id)).map(p => p.name.split(" ")[0]);

  if (submitted) return (
    <div style={{ padding: "60px 24px", textAlign: "center", animation: "scaleIn 0.4s ease-out", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "60vh" }}>
      <div style={{ fontSize: 64, marginBottom: 20 }}>🎉</div>
      <h3 className="gradient-text" style={{ fontSize: 26, fontWeight: 800, marginBottom: 8 }}>Thanks for an epic day!</h3>
      <p style={{ color: C.gray, fontSize: 14, lineHeight: 1.6, maxWidth: 280 }}>Your photos will arrive in your inbox within 24 hours. See you at the next one.</p>
      {giveaway && <div style={{ marginTop: 24, background: `${C.lime}10`, border: `1px solid ${C.lime}22`, borderRadius: 14, padding: "12px 20px", display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 18 }}>🌺</span><span style={{ color: C.lime, fontSize: 13, fontWeight: 600 }}>You're entered to win the Hawaiian shirt!</span></div>}
    </div>
  );

  return (
    <div style={{ padding: "20px 16px", animation: "fadeUp 0.4s ease-out" }} className="no-scrollbar">
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div style={{ fontSize: 36, marginBottom: 8 }}>🌅</div>
        <h3 style={{ fontSize: 22, fontWeight: 800, color: C.white, marginBottom: 4 }}>How Was Your Day?</h3>
        <p style={{ color: C.gray, fontSize: 13 }}>Take a sec to reflect on the vibes.</p>
      </div>
      {/* Stars */}
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <label style={{ color: C.grayLight, fontSize: 12, fontWeight: 600, letterSpacing: 2, display: "block", marginBottom: 12 }}>RATE THE VIBES</label>
        <div style={{ display: "flex", justifyContent: "center", gap: 8 }}>
          {[1,2,3,4,5].map(s => <button key={s} onClick={() => setRating(s)} style={{ transition: "transform 0.15s" }} onMouseDown={e => e.currentTarget.style.transform = "scale(0.85)"} onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}><IcoStar size={36} color={s <= rating ? C.lime : C.grayDark} fill={s <= rating ? C.lime : "none"} sw={1.5} /></button>)}
        </div>
        {rating > 0 && <p style={{ color: C.lime, fontSize: 12, marginTop: 8, fontWeight: 600 }}>{rating === 5 ? "Legendary! 🔥" : rating === 4 ? "Amazing! ✨" : rating === 3 ? "Good vibes! 🌊" : rating === 2 ? "It was alright" : "Thanks for the feedback"}</p>}
      </div>
      {/* Fav Moment */}
      <div style={{ marginBottom: 24 }}>
        <label style={{ color: C.grayLight, fontSize: 12, fontWeight: 600, letterSpacing: 2, display: "block", marginBottom: 8 }}>FAVORITE MOMENT</label>
        <textarea value={favMoment} onChange={e => setFavMoment(e.target.value)} placeholder="What was the highlight of your day?" rows={3} style={{ width: "100%", padding: "14px 16px", borderRadius: 14, fontSize: 14, color: C.white, background: C.card, border: `1px solid ${C.grayDark}`, outline: "none", resize: "none", lineHeight: 1.5 }} onFocus={e => e.target.style.borderColor = C.teal} onBlur={e => e.target.style.borderColor = C.grayDark} />
      </div>
      {/* Connections */}
      {connectedNames.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <label style={{ color: C.grayLight, fontSize: 12, fontWeight: 600, letterSpacing: 2, display: "block", marginBottom: 8 }}>YOU CONNECTED WITH</label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>{connectedNames.map(n => <span key={n} style={{ padding: "6px 14px", borderRadius: 20, fontSize: 12, fontWeight: 600, color: C.teal, background: `${C.teal}10`, border: `1px solid ${C.teal}22` }}>{n}</span>)}</div>
        </div>
      )}
      {/* Giveaway */}
      <div style={{ borderRadius: 16, overflow: "hidden", marginBottom: 20, border: giveaway ? `1px solid ${C.lime}33` : `1px solid ${C.grayDark}`, background: giveaway ? `${C.lime}06` : C.card, transition: "all 0.2s" }}>
        <div style={{ height: 80, background: "linear-gradient(135deg, #00d4aa 0%, #c6f135 50%, #00bcd4 100%)", display: "flex", alignItems: "center", justifyContent: "center", position: "relative" }}>
          <span style={{ fontSize: 40 }}>🌺</span>
          <div style={{ position: "absolute", top: 8, right: 10, background: "rgba(0,0,0,0.5)", backdropFilter: "blur(6px)", padding: "3px 10px", borderRadius: 10 }}><span style={{ fontSize: 10, color: C.white, fontWeight: 700, letterSpacing: 1 }}>LIMITED EDITION</span></div>
        </div>
        <div style={{ padding: 16 }}>
          <h4 style={{ fontSize: 16, fontWeight: 700, color: C.white, marginBottom: 4 }}>Win a Sea-Doo Hawaiian Shirt</h4>
          <p style={{ fontSize: 12, color: C.gray, lineHeight: 1.5, marginBottom: 12 }}>Exclusive Legendary Meetups edition. Rate your day and you're automatically entered. Winner announced at the Après Party!</p>
          <button onClick={() => setGiveaway(!giveaway)} style={{ width: "100%", padding: 14, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: giveaway ? `${C.lime}15` : C.gradient, color: giveaway ? C.lime : C.bg, fontWeight: 700, fontSize: 14, transition: "all 0.2s" }}>
            {giveaway ? <><IcoCheck size={16} color={C.lime} /> You're Entered!</> : <><IcoSparkle size={16} color={C.bg} /> Enter to Win</>}
          </button>
        </div>
      </div>
      {/* Submit */}
      <button onClick={() => rating > 0 && setSubmitted(true)} style={{ width: "100%", padding: 16, borderRadius: 14, fontWeight: 700, fontSize: 16, letterSpacing: 1, color: rating > 0 ? C.bg : C.grayDark, background: rating > 0 ? C.gradient : C.card, opacity: rating > 0 ? 1 : 0.5, transition: "all 0.2s", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
        SUBMIT <IcoArrow size={18} color={rating > 0 ? C.bg : C.grayDark} />
      </button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════

function UnchartedApp() {
  const [screen, setScreen] = useState("splash");
  const [tab, setTab] = useState("crew");
  const [profile, setProfile] = useState(null);
  const [connections, setConnections] = useState(new Set());
  const [cart, setCart] = useState({});

  const handleEnter = () => setScreen("onboarding");
  const handleOnboardingComplete = (data) => { setProfile(data); setScreen("main"); };
  const handleConnect = useCallback((id) => {
    setConnections(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  }, []);

  const cartCount = Object.values(cart).reduce((s, v) => s + v, 0);

  return (
    <div style={{ maxWidth: 430, margin: "0 auto", minHeight: "100vh", background: C.bg, color: C.white, fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif', position: "relative", display: "flex", flexDirection: "column" }}>
      {screen === "splash" && <SplashScreen onEnter={handleEnter} />}
      {screen === "onboarding" && <OnboardingScreen onComplete={handleOnboardingComplete} />}
      {screen === "main" && (
        <>
          <Header profile={profile} />
          <div style={{ flex: 1, overflowY: "auto" }} className="no-scrollbar">
            {tab === "crew" && <CrewBoard profile={profile} connections={connections} onConnect={handleConnect} />}
            {tab === "moments" && <MomentsFeed profile={profile} />}
            {tab === "eats" && <EatsMenu cart={cart} setCart={setCart} />}
            {tab === "vibes" && <VibeLayer />}
            {tab === "rate" && <Closeout profile={profile} connections={connections} />}
          </div>
          <BottomNav active={tab} onNav={setTab} cartCount={cartCount} />
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<UnchartedApp />);
</script>
</body>
</html>
